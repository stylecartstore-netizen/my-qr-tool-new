<!DOCTYPE html>
<html>
<head>
    <title>Advanced QR Generator</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .container { background: white; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select { padding: 10px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #6200ea; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>QR Generator Pro</h1>
        <input type="text" id="text" placeholder="Link yahan likhein">
        <br>
        <label>Rang chunein: </label>
        <input type="color" id="color" value="#000000">
        <br>
        <select id="ecc">
            <option value="L">Low Correction</option>
            <option value="M" selected>Medium Correction</option>
            <option value="Q">High Correction</option>
        </select>
        <br>
        <button onclick="generateQR()">Generate QR</button>
        <br>
        <img id="qrImage" src="" alt="" style="margin-top:20px;">
    </div>

    <script>
        function generateQR() {
            let text = document.getElementById("text").value;
            let color = document.getElementById("color").value.substring(1);
            let ecc = document.getElementById("ecc").value;
            let qrImage = document.getElementById("qrImage");

            if(text.length > 0) {
                // API URL with Color and Error Correction support
                qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${text}&color=${color}&ecc=${ecc}`;
            } else {
                alert("Please koi link enter karein!");
            }
        }
    </script>
</body>
</html>
